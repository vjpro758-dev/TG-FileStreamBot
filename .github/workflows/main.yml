name: Run Stream Bot
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pyrogram tgcrypto aiohttp aiofiles TgFileStreamBot
      - run: python3 -m WebStreamer
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BIN_CHANNEL: ${{ secrets.BIN_CHANNEL }}
          PORT: ${{ secrets.PORT }}
