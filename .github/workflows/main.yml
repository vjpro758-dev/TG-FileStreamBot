name: Run Stream Bot
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go Language
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Compile and Start Bot
        env:
          API_ID: ${{ vars.API_ID }}
          API_HASH: ${{ vars.API_HASH }}
          BOT_TOKEN: ${{ vars.BOT_TOKEN }}
          BIN_CHANNEL: ${{ vars.BIN_CHANNEL }}
          PORT: ${{ vars.PORT }}
        run: go run ./cmd/fsb
