name: Run Stream Bot
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pyrogram tgcrypto aiohttp aiofiles
      - name: Start Server
        run: python3 -m WebStreamer
        env:
          API_ID: ${{ vars.API_ID }}
          API_HASH: ${{ vars.API_HASH }}
          BOT_TOKEN: ${{ vars.BOT_TOKEN }}
          BIN_CHANNEL: ${{ vars.BIN_CHANNEL }}
          PORT: ${{ vars.PORT }}
